<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Курс — KOLOS</title>
  <meta http-equiv="refresh" content="0;url=/" />
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get("id");
      if (!id) {
        var parts = location.pathname.split("/").filter(Boolean);
        id = parts[parts.length - 1];
      }
      if (id && /^\d+$/.test(id)) {
        location.replace("/course/" + id);
      } else {
        location.replace("/courses");
      }
    })();
  </script>
</head>
<body style="margin:0;background:#030303;color:#f5f0e8;font-family:-apple-system,sans-serif;display:grid;place-items:center;min-height:100vh">
  <p>Переход к курсу…</p>
</body>
</html>
