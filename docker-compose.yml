services:
  db:
    image: postgres:16-alpine
    container_name: kolos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kolos
      POSTGRES_PASSWORD: kolos_secret
      POSTGRES_DB: kolos_lms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kolos -d kolos_lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kolos-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://kolos:kolos_secret@db:5432/kolos_lms
      SECRET_KEY: dev-secret-change-in-production
      DEBUG: "true"
      CORS_ORIGINS: http://localhost:3001,https://frontend-blond-one-25.vercel.app
      FRONTEND_URL: https://frontend-blond-one-25.vercel.app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
