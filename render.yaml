services:
  - type: web
    name: kolos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: kolos-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://frontend-blond-one-25.vercel.app
      - key: FRONTEND_URL
        value: https://frontend-blond-one-25.vercel.app

databases:
  - name: kolos-db
    plan: free
